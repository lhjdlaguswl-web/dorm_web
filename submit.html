<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>민원 신청</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>기숙사 하자 신고 시스템</h1>

    <div class="form-box">
      <h2>민원 신청</h2>
      <select id="category">
        <option value="">카테고리 선택</option>
        <option value="전기">전기</option>
        <option value="수도">수도</option>
        <option value="가구">가구</option>
        <option value="냉난방">냉난방</option>
        <option value="기타">기타</option>
      </select>
      <input type="text" id="location" placeholder="위치 (예: 302호 화장실)" />
      <textarea id="description" placeholder="상세 내용을 입력해주세요" rows="4"></textarea>
      <button onclick="submitComplaint()">신청하기</button>
      <p><a href="dashboard.html">← 돌아가기</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
